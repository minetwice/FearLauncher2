name: Build Fear Launcher APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fear-launcher-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fear-launcher-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Get version info
        id: version
        run: |
          VERSION_NAME=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts)
          VERSION_CODE=$(grep -oP 'versionCode = \K\d+' app/build.gradle.kts)
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Fear Launcher v$VERSION_NAME ($VERSION_CODE)"

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}-${{ github.run_number }}
          name: Fear Launcher v${{ steps.version.outputs.version_name }} Build ${{ github.run_number }}
          body: |
            ## Fear Launcher Release
            
            **Version:** ${{ steps.version.outputs.version_name }}
            **Build:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            
            ### What's Included:
            - ✅ Silver & Black Gradient Theme
            - ✅ Modern Material 3 UI
            - ✅ Portrait Dashboard
            - ✅ Bottom Navigation
            - ✅ Version Management
            
            ### Downloads:
            - **Debug APK:** For testing and development
            - **Release APK:** Optimized for production
            
            ### Installation:
            1. Download the APK file
            2. Enable "Install from Unknown Sources" in your device settings
            3. Install the APK
            4. Launch Fear Launcher and enjoy!
            
            ⚠️ **Note:** This is a Minecraft launcher UI. You'll need to add the backend integration to actually launch Minecraft Java Edition.
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Success Message
        run: |
          echo "=========================================="
          echo "✅ Fear Launcher Build Successful!"
          echo "=========================================="
          echo "Version: ${{ steps.version.outputs.version_name }}"
          echo "Build Number: ${{ github.run_number }}"
          echo ""
          echo "📦 APK Files:"
          echo "   - Debug: app/build/outputs/apk/debug/app-debug.apk"
          echo "   - Release: app/build/outputs/apk/release/app-release-unsigned.apk"
          echo ""
          echo "🎉 Check the Actions tab for download links!"
          echo "=========================================="
