name: Build Fear Launcher APK

on:
  workflow_dispatch: # Manual run ke liye
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- YE STEP US ERROR KO FIX KAREGA ---
      - name: Fix Missing Gradle Wrapper (Auto Download)
        run: |
          if [ ! -f "./gradlew" ]; then
            echo "️ gradlew file missing hai! Downloading..."
            # Download gradlew script
            curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradlew -o gradlew
            chmod +x gradlew
            
            # Download wrapper jar aur properties
            mkdir -p gradle/wrapper
            curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
            
            cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
            distributionBase=GRADLE_USER_HOME
            distributionPath=wrapper/dists
            distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
            networkTimeout=10000
            validateDistributionUrl=true
            zipStoreBase=GRADLE_USER_HOME
            zipStorePath=wrapper/dists
            EOF
            echo "✅ Gradle wrapper successfully downloaded!"
          else
            echo "✅ gradlew already exists."
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fear-Launcher-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Create GitHub Release (Optional)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Fear Launcher Build ${{ github.run_number }}
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
