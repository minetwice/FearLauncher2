name: Build & Release Fear Launcher APK

on:
  workflow_dispatch: # Manual run ke liye button
  push:
    branches:
      - main

jobs:
  build-and-release:
    name: Build and Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write # GitHub Release banane ke liye zaroori hai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # --- YE STEP GRADLEW ERROR KO HAMESHA KE LIYE FIX KAREGA ---
      - name: Fix Missing Gradle Wrapper (Auto Download)
        run: |
          if [ ! -f "./gradlew" ]; then
            echo "gradlew missing hai, downloading..."
            curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradlew -o gradlew
            chmod +x gradlew
            mkdir -p gradle/wrapper
            echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
            echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
            echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
            echo "networkTimeout=10000" >> gradle/wrapper/gradle-wrapper.properties
            echo "validateDistributionUrl=true" >> gradle/wrapper/gradle-wrapper.properties
            echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
            echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
            curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          else
            echo "gradlew already exists."
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug
      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Get Version Name
        id: get_version
        run: |
          VERSION=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Fear Launcher Version: $VERSION"

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fear-Launcher-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fear-Launcher-Release-APK
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      # --- YE STEP GITHUB RELEASE BANAYEGA ---
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ steps.get_version.outputs.version }}-${{ github.run_number }}
          name: Fear Launcher v${{ steps.get_version.outputs.version }} (Build ${{ github.run_number }})
          body: |
            ## 🚀 Fear Launcher New Build
            
            **Version:** ${{ steps.get_version.outputs.version }}
            **Build Number:** ${{ github.run_number }}
            
            ### 📥 Downloads:
            - **Debug APK:** For testing and development
            - **Release APK:** Optimized for production
            
            ### ⚠️ Note:
            - Enable "Install from Unknown Sources" in your phone settings before installing.
            - This is a UI build. Backend Minecraft launching logic coming soon!
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
          draft: false
          prerelease: false        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Success Message
        run: |
          echo "=========================================="
          echo "✅ Fear Launcher Build Successful!"
          echo "=========================================="
          echo "APKs uploaded to Artifacts and GitHub Releases."
          echo "=========================================="
